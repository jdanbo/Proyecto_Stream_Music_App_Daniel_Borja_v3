<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MusicStream — Now Playing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/views/player.css">

  <meta name="description" content="Experience the ultimate music player on MusicStream. Enjoy seamless playback, intuitive controls, and a visually stunning interface that brings your music to life.">
  <meta name="keywords" content="music player, seamless playback, intuitive controls, visually stunning interface, music experience">
  <meta name="author" content="Daniel Borja">

  <link rel="icon" type="image/png" href="/assets/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/assets/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png" />
  <link rel="manifest" href="/assets/favicon/site.webmanifest" />
</head>
<body>
    <!-- NAVBAR -->
  <header>
    <nav class="navbar">
      <a href="index.html" class="navbar-logo">
        <img src="assets/img/logoMS.png" alt="MusicStream Logo">
        MusicStream
      </a>
      <div class="navbar-links">
        <a href="index.html">Discover</a>
        <a href="album-detail.html">Library</a>
        <a href="cart.html">Store</a>
      </div>
      <div class="navbar-actions">
        <div class="search-bar">
          <img src="assets/icons/NAV-SEARCH.png" alt="Search">
          <input type="text" placeholder="Search">
        </div>
        <img src="assets/icons/NAV-NOTIFICATION.png" alt="Notifications">
        <img src="assets/img/PROFILEPICTURE.png" alt="Profile" class="avatar">
      </div>
    </nav>
  </header>

  <!-- PLAYER PAGE -->
  <div class="player-page">

    <div class="player-main">

      <div class="player-center">

        <div class="player-artwork-wrap">
          <img src="assets/img/cover-1.jpg" alt="Echoes in the Void" class="player-artwork">
        </div>

        <div class="player-song-info">
          <div>
            <h1 class="player-song-title">Echoes in the Void</h1>
            <p class="player-song-artist">Starlight Symphony</p>
            <p class="player-song-album">Cosmic Waves</p>
          </div>
          <button class="player-heart">
            <img src="assets/icons/P-HEART.png" alt="Favorite">
          </button>
        </div>

      </div>

      <aside class="player-upnext">
        <p class="upnext-title">Up Next</p>

        <div class="upnext-item">
          <img src="assets/img/cover-2.jpg" alt="" class="upnext-cover">
          <div class="upnext-info">
            <p class="upnext-song">Neon Dreams</p>
            <p class="upnext-artist">Synthwave Rider</p>
          </div>
          <span class="upnext-duration">3:45</span>
        </div>

        <div class="upnext-item">
          <img src="assets/img/cover-3.jpg" alt="" class="upnext-cover">
          <div class="upnext-info">
            <p class="upnext-song">Lost in Translation</p>
            <p class="upnext-artist">The Vowels</p>
          </div>
          <span class="upnext-duration">4:12</span>
        </div>

        <div class="upnext-item">
          <img src="assets/img/cover-4.jpg" alt="" class="upnext-cover">
          <div class="upnext-info">
            <p class="upnext-song">City Lights</p>
            <p class="upnext-artist">Urban Explorer</p>
          </div>
          <span class="upnext-duration">2:58</span>
        </div>

        <div class="upnext-item">
          <img src="assets/img/cover-5.jpg" alt="" class="upnext-cover">
          <div class="upnext-info">
            <p class="upnext-song">Ocean Drive</p>
            <p class="upnext-artist">Summer Haze</p>
          </div>
          <span class="upnext-duration">0:00</span>
        </div>

      </aside>
    </div>

    <!-- BOTTOM: PLAYER BAR -->
    <div class="player-bar">

        <div class="player-bar-track">
        <img src="assets/img/cover-1.jpg" alt="" class="player-bar-cover">
        <div>
          <p class="player-bar-title">Echoes in the Void</p>
          <p class="player-bar-artist">Starlight Symphony</p>
        </div>
      </div>

      <!-- Controls -->
      <div class="player-controls">
        <div class="player-btns">
          <button class="ctrl-btn">
            <img src="assets/icons/P-HEART.png" alt="Favorite">
          </button>
          <button class="ctrl-btn">
            <img src="assets/icons/P-RANDOMIZE.png" alt="Shuffle">
          </button>
          <button class="ctrl-btn">
            <img src="assets/icons/P-SKIPLEFT.png" alt="Previous">
          </button>
          <button class="ctrl-btn play-btn">
            <img src="assets/icons/P-PAUSE.png" alt="Pause">
          </button>
          <button class="ctrl-btn">
            <img src="assets/icons/P-SKIPRIGHT.png" alt="Next">
          </button>
          <button class="ctrl-btn">
            <img src="assets/icons/P-LOOP.png" alt="Repeat">
          </button>
        </div>

        <div class="player-progress">
          <span class="progress-time">1:21</span>
          <div class="progress-track">
            <div class="progress-fill"></div>
          </div>
          <span class="progress-time">3:58</span>
        </div>
      </div>

      <div class="player-volume">
        <img src="assets/icons/P-VOLUME.png" alt="Volume">
        <div class="volume-track">
          <div class="volume-fill"></div>
        </div>
      </div>

      <button class="fullscreen-btn">
        <img src="assets/icons/P-FULLSCREEN.png" alt="Fullscreen">
      </button>

    </div>
  </div>

</body>
</html>
